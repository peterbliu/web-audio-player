<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变速音频工具 | Vario-Speed Audio Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      :root {
        color-scheme: dark;
        --bg: #171717;
        --panel: #1f1f1f;
        --panel-soft: #181818;
        --panel-raised: #242424;
        --border: #2f3136;
        --border-strong: #3a3d44;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --text-faint: #6b7280;
        --emerald: #10b981;
        --emerald-strong: #059669;
        --emerald-soft: rgba(16, 185, 129, 0.14);
        --indigo: #4f46e5;
        --indigo-hover: #6366f1;
        --violet: #7c3aed;
        --violet-hover: #8b5cf6;
        --danger: #f87171;
      }

      body {
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        background: var(--panel-soft);
        padding: 18px;
        border: 1px solid #262626;
        border-radius: 12px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        width: 100%;
        max-width: 1180px;
        margin: 0 auto;
      }

      .title {
        font-size: 26px;
        font-weight: 700;
        margin: 0;
        color: var(--text);
        text-align: center;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .app-header {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        margin-bottom: 20px;
      }

      .language-switcher {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
      }

      .language-switcher select {
        min-height: 32px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: #191919;
        color: var(--text);
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .upload-area {
        border: 1px dashed var(--border-strong);
        border-radius: 10px;
        padding: 28px 20px;
        text-align: center;
        cursor: pointer;
        margin-bottom: 24px;
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        background: var(--panel);
        color: var(--text);
      }

      .upload-area p {
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .upload-area:hover {
        border-color: var(--emerald);
        background: #1c2622;
        box-shadow: inset 0 0 0 1px rgba(16, 185, 129, 0.16);
      }

      .upload-area.dragover {
        border-color: var(--emerald);
        background: var(--emerald-soft);
      }

      .upload-area input {
        display: none;
      }

      .upload-hint {
        color: var(--text-faint);
        font-size: 12px;
        margin-top: 8px;
      }

      .player {
        display: none;
      }

      .filename {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 12px;
        text-align: center;
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: #2b2d31;
        border-radius: 999px;
        cursor: pointer;
        position: relative;
        margin: 16px 0;
      }

      .progress {
        height: 100%;
        background: var(--emerald);
        border-radius: inherit;
        width: 0%;
        transition: width 0.1s linear;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 16px 0;
      }

      .ctrl-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--panel-raised);
        color: var(--text);
        border: 1px solid var(--border);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ctrl-btn:hover,
      .speed-btn:hover {
        border-color: var(--emerald);
        background: #202823;
      }

      .ctrl-btn:disabled,
      .speed-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .ctrl-btn svg,
      .play-btn svg {
        width: 20px;
        height: 20px;
      }

      .play-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--emerald-strong);
        color: #ecfdf5;
        border: none;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .speed-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin-top: 16px;
      }

      .speed-btn {
        min-width: 48px;
        padding: 5px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
      }

      .speed-btn.active {
        background: var(--emerald-strong);
        color: #ecfdf5;
        border-color: var(--emerald);
        box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.24);
      }

      .export-panel {
          margin: 18px auto 0;
          padding: 0;
          border: 1px solid var(--border);
          border-radius: 12px;
          background: var(--panel);
          overflow: hidden;
        }

        .export-header {
          display: flex;
          align-items: center;
          padding: 6px 14px;
          cursor: pointer;
          user-select: none;
          border-bottom: 1px solid transparent;
          transition: border-color 0.2s;
        }

        .export-header:hover {
          border-bottom-color: var(--border-strong);
        }

        .export-toggle-btn {
          background: none;
          border: none;
          color: var(--text-muted);
          font-size: 12px;
          font-weight: 500;
          display: inline-flex;
          align-items: center;
          gap: 4px;
          padding: 4px 6px;
          cursor: pointer;
          border-radius: 4px;
          transition: background 0.2s, color 0.2s;
        }

        .export-toggle-btn:hover {
          background: var(--panel-raised);
          color: var(--text);
        }

        .export-toggle-btn:focus-visible {
          outline: 2px solid var(--emerald);
          outline-offset: 1px;
        }

        .export-toggle-btn svg {
          width: 14px;
          height: 14px;
          transition: transform 0.25s ease;
        }

        .export-toggle-btn[aria-expanded="true"] svg {
          transform: rotate(90deg);
        }

        .export-body {
          padding: 14px;
          border-top: 1px solid var(--border);
          animation: fadeSlide 0.2s ease;
        }

        @keyframes fadeSlide {
          from {
            opacity: 0;
            transform: translateY(-6px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

      .export-toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: end;
      }

      .export-fields {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        min-width: 160px;
      }

      .field label {
        font-size: 12px;
        color: var(--text-muted);
      }

      .field select {
        min-height: 36px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: #191919;
        color: var(--text);
        padding: 6px 10px;
        font-size: 14px;
      }

      .field select:focus,
      .speed-btn:focus-visible,
      .ctrl-btn:focus-visible,
      .play-btn:focus-visible,
      .track-item:focus-visible {
        outline: 2px solid var(--emerald);
        outline-offset: 2px;
      }

      .download-btn:focus-visible {
        outline: 2px solid var(--indigo-hover);
        outline-offset: 2px;
      }

      .download-btn,
      .cancel-export-btn {
        min-height: 36px;
        border: none;
        border-radius: 8px;
        color: #ecfdf5;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .download-btn {
        background: var(--indigo);
      }

      .download-btn:hover:not(:disabled) {
        background: var(--indigo-hover);
      }

      .cancel-export-btn {
        display: none;
        background: var(--violet);
      }

      .cancel-export-btn.visible {
        display: inline-flex;
      }

      .cancel-export-btn:hover:not(:disabled) {
        background: var(--violet-hover);
      }

      .cancel-export-btn:focus-visible {
        outline: 2px solid var(--violet-hover);
        outline-offset: 2px;
      }

      .download-btn:disabled,
      .cancel-export-btn:disabled {
        background: #374151;
        color: var(--text-faint);
        cursor: not-allowed;
      }

      .download-btn svg,
      .cancel-export-btn svg {
        width: 16px;
        height: 16px;
      }

      .download-btn.busy svg {
        animation: slow-spin 1.4s linear infinite;
      }

      @keyframes slow-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .batch-export-control,
      .select-all-control,
      .track-select-control {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--text-muted);
        font-size: 12px;
        user-select: none;
      }

      .batch-export-control {
        min-height: 36px;
        align-self: end;
        white-space: nowrap;
      }

      .batch-export-control input,
      .select-all-control input,
      .track-select-control input {
        width: 16px;
        height: 16px;
        accent-color: var(--emerald);
        cursor: pointer;
      }

      .export-progress-bar {
        width: 100%;
        height: 4px;
        margin-top: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: #2b2d31;
      }

      .export-progress {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--indigo);
        transition: width 0.2s ease;
      }

      .export-status {
        min-height: 18px;
        margin-top: 7px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .time {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
      }

      .playlist {
        margin-top: 24px;
      }

      .playlist-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .playlist-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }

      .select-all-control {
        visibility: hidden;
      }

      .select-all-control.visible {
        visibility: visible;
      }

      .playlist-empty {
        color: var(--text-muted);
        font-size: 14px;
        padding: 14px 16px;
        border: 1px dashed var(--border-strong);
        border-radius: 12px;
        background: var(--panel);
      }

      .track-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .track-item {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 10px;
        padding: 14px 16px;
        cursor: pointer;
        text-align: left;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.2s;
      }

      .track-item:hover {
        border-color: var(--emerald);
        background: #202823;
      }

      .track-item.active {
        border-color: var(--emerald);
        background: var(--emerald-soft);
        box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.08);
      }

      .track-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .track-main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        flex: 1;
      }

      .track-info {
        min-width: 0;
        flex: 1;
      }

      .track-name {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .track-meta {
        display: block;
        font-size: 12px;
        color: var(--text-faint);
        margin-top: 4px;
      }

      .version-label {
        margin-top: 18px;
        text-align: center;
        color: var(--text-faint);
        font-size: 11px;
      }

      .delete-btn {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        color: var(--danger);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        flex-shrink: 0;
      }

      .delete-btn:hover {
        background: rgba(248, 113, 113, 0.12);
      }

      .delete-btn svg {
        width: 15px;
        height: 15px;
      }

      @media (max-width: 640px) {
        body {
          margin: 0 auto;
          padding: 12px;
        }

        .container {
          width: 100%;
          padding: 20px;
        }

        .title {
          font-size: 22px;
        }

        .app-header {
          min-height: 70px;
          align-items: flex-start;
        }

        .language-switcher {
          top: auto;
          bottom: 0;
          transform: none;
        }

        .export-toolbar {
          grid-template-columns: 1fr;
        }

        .download-btn,
        .cancel-export-btn,
        .batch-export-control,
        .field {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="app-header">
        <div class="title" data-i18n="appTitle">变速音频工具</div>
        <label class="language-switcher" for="languageSelect">
          <select id="languageSelect" aria-label="语言 / Language">
            <option value="zh">CN</option>
            <option value="en">EN</option>
          </select>
        </label>
      </div>

      <div class="upload-area" id="uploadArea">
        <p data-i18n="uploadMain">点击或拖拽音频文件到这里</p>
        <p class="upload-hint">
          <span data-i18n="uploadHint">支持一次添加多个文件</span>
          mp3 / wav / m4a / ogg
        </p>
        <input type="file" id="fileInput" accept="audio/*" multiple />
      </div>

      <div class="player" id="player">
        <div class="filename" id="fileName"></div>

        <div class="time">
          <span id="current">0:00</span> / <span id="duration">0:00</span>
        </div>

        <div class="progress-bar" id="progressBar">
          <div class="progress" id="progress"></div>
        </div>

      <div class="controls">
        <button class="ctrl-btn" id="toBeginBtn" aria-label="回到开头" data-i18n-aria-label="toBegin">
          <i data-lucide="skip-back"></i>
        </button>
        <button class="ctrl-btn" id="skipBackBtn" aria-label="后退5秒" data-i18n-aria-label="skipBack">
          <i data-lucide="rewind"></i>
        </button>
        <button class="play-btn" id="playBtn" aria-label="播放" data-i18n-aria-label="play">
          <i data-lucide="play"></i>
        </button>
        <button class="ctrl-btn" id="skipForwardBtn" aria-label="前进5秒" data-i18n-aria-label="skipForward">
          <i data-lucide="fast-forward"></i>
        </button>
        <button class="ctrl-btn" id="toEndBtn" aria-label="跳到结尾" data-i18n-aria-label="toEnd">
          <i data-lucide="skip-forward"></i>
        </button>
      </div>

        <div class="speed-group">
          <button class="speed-btn" data-speed="0.5">0.5x</button>
          <button class="speed-btn" data-speed="0.55">0.55x</button>
          <button class="speed-btn" data-speed="0.6">0.6x</button>
          <button class="speed-btn" data-speed="0.65">0.65x</button>
          <button class="speed-btn" data-speed="0.7">0.7x</button>
          <button class="speed-btn" data-speed="0.75">0.75x</button>
          <button class="speed-btn" data-speed="0.8">0.8x</button>
          <button class="speed-btn" data-speed="0.85">0.85x</button>
          <button class="speed-btn" data-speed="0.9">0.9x</button>
          <button class="speed-btn" data-speed="0.95">0.95x</button>
          <button class="speed-btn active" data-speed="1.0">1.0x</button>
          <button class="speed-btn" data-speed="1.1">1.1x</button>
          <button class="speed-btn" data-speed="1.2">1.2x</button>
          <button class="speed-btn" data-speed="1.3">1.3x</button>
          <button class="speed-btn" data-speed="1.4">1.4x</button>
          <button class="speed-btn" data-speed="1.5">1.5x</button>
        </div>

        <div class="export-panel" id="exportPanel">
          <div class="export-header">
            <button class="export-toggle-btn" id="exportToggleBtn" aria-expanded="false">
              <i data-lucide="chevron-right"></i>
              <span data-i18n="exportToggleLabel">导出</span>
            </button>
          </div>
          <div class="export-body" id="exportBody" style="display: none;">
            <div class="export-toolbar">
              <div class="export-fields">
                <div class="field">
                  <label for="exportMode" data-i18n="exportModeLabel">导出模式</label>
                  <select id="exportMode">
                    <option value="live" selected data-i18n="exportModeLive">
                      浏览器 PCM 捕获 - 实时速度
                    </option>
                    <option value="ffmpeg" data-i18n="exportModeFfmpeg">
                      FFmpeg atempo 导出 - 直接渲染
                    </option>
                  </select>
                </div>
                <div class="field">
                  <label for="exportFormat" data-i18n="formatLabel">格式</label>
                  <select id="exportFormat">
                    <option value="wav">WAV</option>
                    <option value="mp3-192">MP3 192k</option>
                    <option value="mp3-256">MP3 256k</option>
                  </select>
                </div>
                <label class="batch-export-control" title="使用当前速度导出所有已选播放列表项目" data-i18n-title="batchExportTitle">
                  <input type="checkbox" id="batchExportSelected" />
                  <span data-i18n="batchExportLabel">导出已选</span>
                </label>
              </div>
              <button class="download-btn" id="downloadBtn" type="button">
                <i data-lucide="download"></i>
                <span data-i18n="downloadCurrent">下载当前速度音频</span>
              </button>
              <button
                class="cancel-export-btn"
                id="cancelExportBtn"
                type="button"
                aria-label="取消导出"
                data-i18n-aria-label="cancelExport"
              >
                <i data-lucide="x"></i>
                <span data-i18n="cancel">取消</span>
              </button>
            </div>
            <div
              class="export-progress-bar"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              id="exportProgressBar"
            >
              <div class="export-progress" id="exportProgress"></div>
            </div>
            <div class="export-status" id="exportStatus">
              默认使用浏览器实时 PCM 捕获导出 WAV，使用当前选择的播放速度。
            </div>
          </div>
        </div>
      </div>

      <div class="playlist">
        <div class="playlist-header">
          <div class="playlist-title" data-i18n="playlistTitle">播放列表</div>
          <label
            class="select-all-control"
            id="selectAllControl"
            title="Click to select all. Shift-click to clear all."
            data-i18n-title="selectAllTitle"
          >
            <input type="checkbox" id="selectAllTracks" />
            <span id="selectAllLabel">全选</span>
          </label>
        </div>
        <div class="playlist-empty" id="playlistEmpty" data-i18n="playlistEmpty">
          还没有音频文件，拖拽或上传多个文件后会自动加入列表。
        </div>
        <div class="track-list" id="trackList"></div>
      </div>

      <div class="version-label">v0.025</div>
    </div>

    <script>
      let sound = null;
      let isPlaying = false;
      let currentSpeed = 1.0;
      let tracks = [];
      const selectedTrackIds = new Set();
      let currentTrackId = null;
      let progressFrame = null;
      let isExporting = false;
      let cancelExportRequested = false;
      let activeFfmpeg = null;
      let ffmpegInstance = null;
      let currentLanguage = "zh";

      const translations = {
        zh: {
          appTitle: "变速音频工具",
          documentTitle: "变速音频工具",
          uploadMain: "点击或拖拽音频文件到这里",
          uploadHint: "支持一次添加多个文件",
          toBegin: "回到开头",
          play: "播放",
          pause: "暂停",
          toEnd: "跳到结尾",
          exportModeLabel: "导出模式",
          exportModeLive: "浏览器 PCM 捕获 - 实时速度",
          exportModeFfmpeg: "FFmpeg atempo 导出 - 直接渲染",
          formatLabel: "格式",
          batchExportTitle: "使用当前速度导出所有已选播放列表项目",
          batchExportLabel: "导出已选",
          downloadCurrent: "下载当前速度音频",
          downloadSelected: "批量导出已选",
          exporting: "导出中...",
          batchExporting: "批量导出中...",
          cancel: "取消",
          cancelExport: "取消导出",
          playlistTitle: "播放列表",
          selectAllTitle: "单击全选。按住 Shift 单击清空选择。",
          selectAll: "全选",
          selectedCount: "已选 {selected}/{total}",
          playlistEmpty: "还没有音频文件，拖拽或上传多个文件后会自动加入列表。",
          selectTrack: "选择 {name}",

      const uploadArea = document.getElementById("uploadArea");
      const languageSelect = document.getElementById("languageSelect");

      const progressBar = document.getElementById("progressBar");
      const progress = document.getElementById("progress");
      const fileName = document.getElementById("fileName");
      const currentTimeEl = document.getElementById("current");
      const durationEl = document.getElementById("duration");
      const speedBtns = document.querySelectorAll(".speed-btn");
      const trackList = document.getElementById("trackList");

      const exportMode = document.getElementById("exportMode");

      const downloadBtn = document.getElementById("downloadBtn");

      const exportProgress = document.getElementById("exportProgress");

      const selectAllControl = document.getElementById("selectAllControl");
      const selectAllTracks = document.getElementById("selectAllTracks");
      const selectAllLabel = document.getElementById("selectAllLabel");

      uploadArea.addEventListener("click", () => fileInput.click());

      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });
      uploadArea.addEventListener("dragleave", () => {
        uploadArea.classList.remove("dragover");
      });
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        addFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener("change", (e) => {
        addFiles(e.target.files);
        fileInput.value = "";
      });

      languageSelect.addEventListener("change", () => {
        setLanguage(languageSelect.value);
      });

      function setLanguage(language) {
        currentLanguage = translations[language] ? language : "zh";
        languageSelect.value = currentLanguage;
        document.documentElement.lang = currentLanguage === "zh" ? "zh-CN" : "en";
        document.title = t("documentTitle");

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-title]").forEach((element) => {
          element.title = t(element.dataset.i18nTitle);
        });
        document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
          element.setAttribute("aria-label", t(element.dataset.i18nAriaLabel));
        });

        updateExportHint();
        updateSelectionUi();
        setPlayButton(isPlaying);
      }

      function t(key, params = {}) {
        const template =
          translations[currentLanguage]?.[key] || translations.zh[key] || key;
        return template.replace(/\{(\w+)\}/g, (_, name) =>
          Object.prototype.hasOwnProperty.call(params, name) ? params[name] : "",
        );
      }

      function addFiles(fileList) {
        const audioFiles = Array.from(fileList).filter((file) =>
          file.type.startsWith("audio/"),
        );
        if (!audioFiles.length) return;

        const newTracks = audioFiles.map((file) => ({
          id: `${file.name}-${file.size}-${file.lastModified}-${crypto.randomUUID()}`,
          name: file.name,
          size: formatFileSize(file.size),
          file,
          url: URL.createObjectURL(file),
        }));

        tracks = [...tracks, ...newTracks];
        renderPlaylist();
        updateSelectionUi();

        if (!currentTrackId && newTracks[0]) {
          selectTrack(newTracks[0].id, false);
        }
      }

      function selectTrack(trackId, autoPlay = true) {
        const track = tracks.find((item) => item.id === trackId);
        if (!track) return;

        currentTrackId = track.id;
        fileName.textContent = track.name;
        player.style.display = "block";
        progress.style.width = "0%";
        currentTimeEl.textContent = "0:00";
        durationEl.textContent = "0:00";

        const previousSound = sound;
        if (previousSound) previousSound.unload();
        isPlaying = false;
        stopProgressLoop();
        setPlayButton(false);

        const nextSound = new Howl({
          src: [track.url],
          html5: true,
          rate: currentSpeed,
          onplay: () => {
            if (sound !== nextSound) return;
            isPlaying = true;
            setPlayButton(true);
            startProgressLoop();
          },
          onpause: () => {
            if (sound !== nextSound) return;
            isPlaying = false;
            stopProgressLoop();
            setPlayButton(false);
          },
          onend: () => {
            if (sound !== nextSound) return;
            isPlaying = false;
            stopProgressLoop();
            progress.style.width = "100%";
            currentTimeEl.textContent = formatTime(nextSound.duration());
            setPlayButton(false);
          },
          onload: () => {
            if (sound !== nextSound) return;
            durationEl.textContent = formatTime(nextSound.duration());
            if (autoPlay && !nextSound.playing()) nextSound.play();
          },
        });

        sound = nextSound;

        renderPlaylist();
      }

      playBtn.addEventListener("click", () => {
        togglePlayback();
      });

      document.addEventListener("keydown", (event) => {
        if (event.code !== "Space" || event.repeat || shouldIgnoreShortcut(event)) {
          return;
        }

        event.preventDefault();
        togglePlayback();
      });

      function togglePlayback() {
        if (!sound) return;
        if (isPlaying) sound.pause();
        else if (!sound.playing()) sound.play();
      }

      function shouldIgnoreShortcut(event) {
        const target = event.target;
        if (!(target instanceof Element)) return false;
        return Boolean(
          target.closest(
            "button, input, select, textarea, [contenteditable='true']",
          ),
        );
      }

      document.getElementById('skipBackBtn').addEventListener('click', () => {
        if (!sound) return;
        const currentTime = sound.seek() || 0;
        const newTime = Math.max(0, currentTime - 5);
        sound.seek(newTime);
        const dur = sound.duration();
        if (dur > 0) {
          progress.style.width = (newTime / dur) * 100 + '%';
        }
        currentTimeEl.textContent = formatTime(newTime);
        // 如果正在播放，继续更新；否则停止循环
        if (isPlaying) {
          stopProgressLoop();
          startProgressLoop();
        }
      });

      document.getElementById('skipForwardBtn').addEventListener('click', () => {
        if (!sound) return;
        const currentTime = sound.seek() || 0;
        const duration = sound.duration();
        const newTime = Math.min(duration, currentTime + 5);
        sound.seek(newTime);
        if (duration > 0) {
          progress.style.width = (newTime / duration) * 100 + '%';
        }
        currentTimeEl.textContent = formatTime(newTime);
        if (isPlaying) {
          stopProgressLoop();
          startProgressLoop();
        }
      });


      toBeginBtn.addEventListener("click", () => {
        if (!sound) return;
        sound.seek(0);
        progress.style.width = "0%";
        currentTimeEl.textContent = "0:00";
      });

      toEndBtn.addEventListener("click", () => {
        if (!sound) return;
        const dur = sound.duration();
        sound.seek(dur);
        progress.style.width = "100%";
        currentTimeEl.textContent = formatTime(dur);
      });

      progressBar.addEventListener("click", (e) => {
        if (!sound) return;
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        const seek = sound.duration() * percent;
        sound.seek(seek);
        progress.style.width = percent * 100 + "%";
      });

      function updateProgress() {
        if (!sound || !isPlaying) return;
        const dur = sound.duration();
        const cur = sound.seek();
        if (!dur) return;
        progress.style.width = (cur / dur) * 100 + "%";
        currentTimeEl.textContent = formatTime(cur);
        progressFrame = requestAnimationFrame(updateProgress);
      }

      function startProgressLoop() {
        stopProgressLoop();
        progressFrame = requestAnimationFrame(updateProgress);
      }

      function stopProgressLoop() {
        if (progressFrame !== null) {
          cancelAnimationFrame(progressFrame);
          progressFrame = null;
        }
      }

      speedBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          speedBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentSpeed = parseFloat(btn.dataset.speed);
          if (sound) sound.rate(currentSpeed);
        });
      });

      exportMode.addEventListener("change", updateExportHint);
      exportFormat.addEventListener("change", updateExportHint);
      batchExportSelected.addEventListener("change", () => {
        updateSelectionUi();
        updateExportHint();
      });

      selectAllTracks.addEventListener("click", (event) => {
        if (event.shiftKey) {
          event.preventDefault();
          selectedTrackIds.clear();
        } else {
          tracks.forEach((track) => selectedTrackIds.add(track.id));
        }
        renderPlaylist();
        updateSelectionUi();
      });

      cancelExportBtn.addEventListener("click", () => {
        if (!isExporting) return;
        cancelExportRequested = true;
        cancelExportBtn.disabled = true;
        setExportStatus(t("cancelling"));

        if (activeFfmpeg) {
          activeFfmpeg.terminate();
          activeFfmpeg = null;
          ffmpegInstance = null;
        }
      });

      downloadBtn.addEventListener("click", async () => {
        if (isExporting) return;

        const queue = batchExportSelected.checked
          ? getSelectedTracks()
          : [getCurrentTrack()].filter(Boolean);

        if (!queue.length) {
          setExportStatus(
            batchExportSelected.checked
              ? t("chooseSelectedFirst")
              : t("chooseTrackFirst"),
          );
          return;
        }

        setExportBusy(true);
        setExportProgress(0);

        try {
          await exportTracks(queue);
        } catch (error) {
          if (isExportCancelled(error)) {
            setExportProgress(0);
            setExportStatus(t("cancelled"));
          } else {
            console.error(error);
            setExportStatus(t("exportFailed", { message: error.message || error }));
          }
        } finally {
          setExportBusy(false);
        }
      });

      async function exportTracks(queue) {
        throwIfExportCancelled();
        if (queue.length === 1) {
          await exportOneTrack(queue[0]);
          return;
        }

        for (let index = 0; index < queue.length; index += 1) {
          throwIfExportCancelled();
          const track = queue[index];
          setExportStatus(
            t("batchProgress", {
              index: index + 1,
              total: queue.length,
              name: track.name,
            }),
          );
          setExportProgress(Math.round((index / queue.length) * 100));
          await exportOneTrack(track);
          throwIfExportCancelled();
          await wait(250);
        }

        setExportProgress(100);
        setExportStatus(
          t("batchDone", {
            count: queue.length,
            speed: formatSpeedRate(currentSpeed),
          }),
        );
      }

      async function exportOneTrack(track) {
        throwIfExportCancelled();
        if (exportMode.value === "live") {
          await exportWithLivePlayback(track);
          return;
        }

        await exportWithFfmpegAtempo(track);
      }

      function updateExportHint() {
        if (
          window.location.protocol === "file:" &&
          (exportFormat.value.startsWith("mp3") || exportMode.value === "ffmpeg")
        ) {
          setExportStatus(
            t("fileProtocolWarning"),
          );
          return;
        }

        if (exportFormat.value.startsWith("mp3")) {
          setExportStatus(
            exportMode.value === "live"
              ? t("mp3LiveHint")
              : t("mp3FfmpegHint"),
          );
          return;
        }

        if (exportMode.value === "live") {
          setExportStatus(t("liveHint"));
          return;
        }

        setExportStatus(t("ffmpegHint"));
      }

      async function exportWithLivePlayback(track) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          throw new Error("This browser does not support Web Audio.");
        }

        throwIfExportCancelled();
        setExportStatus(t("liveRendering"));

        const audio = new Audio(track.url);
        audio.crossOrigin = "anonymous";
        audio.playbackRate = currentSpeed;
        audio.defaultPlaybackRate = currentSpeed;
        audio.preservesPitch = true;
        audio.mozPreservesPitch = true;
        audio.webkitPreservesPitch = true;
        audio.volume = 0;

        let context = null;
        let stream = null;
        let source = null;
        let processor = null;
        let silence = null;
        let progressTimer = null;

        const cleanupLiveExport = async () => {
          if (progressTimer !== null) {
            window.clearInterval(progressTimer);
            progressTimer = null;
          }
          audio.pause();
          processor?.disconnect();
          silence?.disconnect();
          source?.disconnect();
          stream?.getTracks().forEach((streamTrack) => streamTrack.stop());
          if (context && context.state !== "closed") {
            await context.close();
          }
        };

        try {
          await waitForMediaCanPlay(audio);
          throwIfExportCancelled();

          const capture =
            audio.captureStream ||
            audio.mozCaptureStream ||
            audio.webkitCaptureStream;
          if (!capture) {
            return exportWithOfflinePlaybackRate(track);
          }

          context = new AudioContextClass();
          stream = capture.call(audio);
          if (!stream.getAudioTracks().length) {
            await audio.play();
            await waitForAudioTrack(stream);
            throwIfExportCancelled();
            audio.pause();
            audio.currentTime = 0;
            await waitForSeek(audio);
          }

          source = context.createMediaStreamSource(stream);
          processor = context.createScriptProcessor(4096, 2, 2);
          silence = context.createGain();
          silence.gain.value = 0;
          const channelChunks = [];
          let sampleCount = 0;
          const expectedSeconds = Math.max(0.1, audio.duration || 0) / currentSpeed;

          processor.onaudioprocess = (event) => {
            if (cancelExportRequested) {
              audio.pause();
              return;
            }

            const input = event.inputBuffer;
            const channelCount = Math.max(1, input.numberOfChannels);
            while (channelChunks.length < channelCount) channelChunks.push([]);

            for (let channel = 0; channel < channelCount; channel += 1) {
              channelChunks[channel].push(
                new Float32Array(input.getChannelData(channel)),
              );
            }
            sampleCount += input.length;
          };

          source.connect(processor);
          processor.connect(silence);
          silence.connect(context.destination);

          await context.resume();
          throwIfExportCancelled();
          await audio.play();

          progressTimer = window.setInterval(() => {
            if (cancelExportRequested) {
              audio.pause();
              return;
            }
            const percent = Math.min(
              95,
              ((audio.currentTime / Math.max(audio.duration, 0.1)) * 100) || 0,
            );
            setExportProgress(percent);
            setExportStatus(
              t("liveProgress", { percent: Math.round(percent) }),
            );
          }, 250);

          await new Promise((resolve, reject) => {
            let cancelTimer = null;
            audio.addEventListener(
              "ended",
              () => {
                if (cancelTimer !== null) window.clearInterval(cancelTimer);
                resolve();
              },
              { once: true },
            );
            cancelTimer = window.setInterval(() => {
              if (!cancelExportRequested) return;
              window.clearInterval(cancelTimer);
              reject(new ExportCancelledError());
            }, 100);
          });

          throwIfExportCancelled();
          await cleanupLiveExport();

          setExportProgress(96);
          setExportStatus(t("writingWav"));

          const samples = channelChunks.map((chunks) => {
            const channel = new Float32Array(sampleCount);
            let offset = 0;
            for (const chunk of chunks) {
              channel.set(chunk, offset);
              offset += chunk.length;
            }
            return channel;
          });
          const sampleRate = context.sampleRate;
          const wavBlob = encodeWavSamples(samples, sampleRate);

          throwIfExportCancelled();
          if (exportFormat.value === "wav") {
            downloadBlob(wavBlob, buildOutputName(track.name, currentSpeed, "wav", "live"));
            setExportStatus(
              t("liveDoneWav", {
                duration: formatTime(expectedSeconds),
                speed: formatSpeedRate(currentSpeed),
              }),
            );
          } else {
            await encodeCapturedWavWithFfmpeg(track, wavBlob);
            setExportStatus(
              t("liveDoneFormat", {
                duration: formatTime(expectedSeconds),
                speed: formatSpeedRate(currentSpeed),
                format: selectedExportSettings().label,
              }),
            );
          }
          setExportProgress(100);
        } catch (error) {
          await cleanupLiveExport();
          throw error;
        }
      }

      async function encodeCapturedWavWithFfmpeg(track, wavBlob) {
        throwIfExportCancelled();
        const settings = selectedExportSettings();
        setExportStatus(t("compressCaptured", { format: settings.label }));
        const ffmpeg = await getFfmpeg();
        activeFfmpeg = ffmpeg;
        const inputName = `captured-${Date.now()}.wav`;
        const outputName = `captured-${Date.now()}.${settings.extension}`;

        try {
          await ffmpeg.writeFile(
            inputName,
            new Uint8Array(await wavBlob.arrayBuffer()),
          );
          throwIfExportCancelled();
          await ffmpeg.exec([
            "-i",
            inputName,
            ...settings.ffmpegArgs,
            outputName,
          ]);
          throwIfExportCancelled();

          const data = await ffmpeg.readFile(outputName);
          await deleteFfmpegFileQuietly(ffmpeg, inputName);
          await deleteFfmpegFileQuietly(ffmpeg, outputName);

          downloadBlob(
            new Blob([data.buffer], { type: settings.mimeType }),
            buildOutputName(
              track.name,
              currentSpeed,
              settings.extension,
              `live_${settings.nameSuffix}`,
            ),
          );
        } catch (error) {
          if (cancelExportRequested) throw new ExportCancelledError();
          throw error;
        } finally {
          activeFfmpeg = null;
        }
      }

      async function exportWithFfmpegAtempo(track) {
        throwIfExportCancelled();
        setExportStatus(t("ffmpegLoading"));
        const ffmpeg = await getFfmpeg();
        activeFfmpeg = ffmpeg;
        const settings = selectedExportSettings();
        const inputName = `input-${Date.now()}-${safeFileName(track.name)}`;
        const outputName = `output-${Date.now()}.${settings.extension}`;

        ffmpeg.on("progress", ({ progress }) => {
          const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
          setExportProgress(percent);
          setExportStatus(t("ffmpegProgress", { percent }));
        });

        try {
          await ffmpeg.writeFile(inputName, await fetchFile(track.file));
          throwIfExportCancelled();
          setExportStatus(
            t("ffmpegExporting", {
              speed: formatSpeedRate(currentSpeed),
              format: settings.label,
            }),
          );
          await ffmpeg.exec([
            "-i",
            inputName,
            "-af",
            `atempo=${currentSpeed}`,
            ...settings.ffmpegArgs,
            outputName,
          ]);
          throwIfExportCancelled();

          const data = await ffmpeg.readFile(outputName);
          await deleteFfmpegFileQuietly(ffmpeg, inputName);
          await deleteFfmpegFileQuietly(ffmpeg, outputName);

          const outputBlob = new Blob([data.buffer], { type: settings.mimeType });
          downloadBlob(
            outputBlob,
            buildOutputName(
              track.name,
              currentSpeed,
              settings.extension,
              settings.extension === "wav"
                ? "atempo"
                : `atempo_${settings.nameSuffix}`,
            ),
          );
          setExportProgress(100);
          setExportStatus(
            t("ffmpegDone", {
              speed: formatSpeedRate(currentSpeed),
              format: settings.label,
            }),
          );
        } catch (error) {
          if (cancelExportRequested) throw new ExportCancelledError();
          throw error;
        } finally {
          activeFfmpeg = null;
        }
      }

      async function exportWithOfflinePlaybackRate(track) {
        throwIfExportCancelled();
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const OfflineAudioContextClass =
          window.OfflineAudioContext || window.webkitOfflineAudioContext;
        if (!AudioContextClass || !OfflineAudioContextClass) {
          throw new Error("This browser cannot render audio for export.");
        }

        setExportStatus(t("offlineRendering"));
        const audioContext = new AudioContextClass();
        const sourceBuffer = await audioContext.decodeAudioData(
          await track.file.arrayBuffer(),
        );
        await audioContext.close();

        const frameCount = Math.ceil(sourceBuffer.length / currentSpeed);
        const offlineContext = new OfflineAudioContextClass(
          sourceBuffer.numberOfChannels,
          frameCount,
          sourceBuffer.sampleRate,
        );
        const source = offlineContext.createBufferSource();
        source.buffer = sourceBuffer;
        source.playbackRate.value = currentSpeed;
        source.connect(offlineContext.destination);
        source.start();
        const rendered = await offlineContext.startRendering();
        throwIfExportCancelled();
        const wavBlob = encodeWav(rendered);
        downloadBlob(wavBlob, buildOutputName(track.name, currentSpeed, "wav", "offline"));
        setExportProgress(100);
        setExportStatus(
          t("offlineDone"),
        );
      }

      async function getFfmpeg() {
        if (ffmpegInstance) return ffmpegInstance;
        const isFilePage = window.location.protocol === "file:";
        if (isFilePage) {
          throw new Error(
            "FFmpeg/MP3 export needs a local server. Please open this tool from http://localhost, not file://.",
          );
        }

        await loadScript("vendor/ffmpeg/ffmpeg.js");

        const { FFmpeg } = FFmpegWASM;
        const ffmpeg = new FFmpeg();

        const baseUrl = new URL("vendor/ffmpeg/", window.location.href).href;
        const coreBaseUrl = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd";
        await ffmpeg.load({
          coreURL: `${baseUrl}ffmpeg-core.js`,
          wasmURL: `${coreBaseUrl}/ffmpeg-core.wasm`,
          workerURL: `${baseUrl}ffmpeg-core.worker.js`,
        });

        ffmpegInstance = ffmpeg;
        return ffmpegInstance;
      }

      async function loadScript(src) {
        if (document.querySelector(`script[src="${src}"]`)) return;
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Cannot load ${src}`));
          document.head.appendChild(script);
        });
      }

      async function fetchFile(file) {
        return new Uint8Array(await file.arrayBuffer());
      }

      function getCurrentTrack() {
        return tracks.find((track) => track.id === currentTrackId) || null;
      }

      function getRecorderMimeType() {
        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/mp4",
        ];
        return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
      }

      function waitForMediaReady(audio) {
        if (audio.readyState >= 2) return Promise.resolve();
        audio.load();
        return new Promise((resolve, reject) => {
          audio.addEventListener("loadedmetadata", resolve, { once: true });
          audio.addEventListener("error", () => {
            reject(new Error("Cannot load audio for export."));
          }, { once: true });
        });
      }

      function waitForMediaCanPlay(audio) {
        if (audio.readyState >= HTMLMediaElement.HAVE_FUTURE_DATA) {
          return Promise.resolve();
        }
        audio.load();
        return new Promise((resolve, reject) => {
          audio.addEventListener("canplaythrough", resolve, { once: true });
          audio.addEventListener(
            "error",
            () => reject(new Error("Could not load audio for speed-adjusted export.")),
            { once: true },
          );
        });
      }

      function waitForSeek(audio) {
        if (!audio.seeking) return Promise.resolve();
        return new Promise((resolve) => {
          audio.addEventListener("seeked", resolve, { once: true });
        });
      }

      function waitForAudioTrack(stream) {
        if (stream.getAudioTracks().length) return Promise.resolve();

        return new Promise((resolve, reject) => {
          const timeout = window.setTimeout(() => {
            stream.removeEventListener("addtrack", onAddTrack);
            reject(new Error("No audio track was captured from playback."));
          }, 3000);

          function onAddTrack() {
            if (!stream.getAudioTracks().length) return;
            window.clearTimeout(timeout);
            stream.removeEventListener("addtrack", onAddTrack);
            resolve();
          }

          stream.addEventListener("addtrack", onAddTrack);
        });
      }

      function setExportBusy(busy) {
        isExporting = busy;
        if (busy) cancelExportRequested = false;
        downloadBtn.classList.toggle("busy", busy);
        downloadBtn.disabled = busy || !canExportNow();
        cancelExportBtn.classList.toggle("visible", busy);
        cancelExportBtn.disabled = !busy;
        exportMode.disabled = busy;
        exportFormat.disabled = busy;
        batchExportSelected.disabled = busy;
        selectAllTracks.disabled = busy;
        speedBtns.forEach((button) => {
          button.disabled = busy;
        });
        downloadBtn.innerHTML = busy
          ? `<i data-lucide="loader"></i> <span>${
              batchExportSelected.checked ? t("batchExporting") : t("exporting")
            }</span>`
          : downloadButtonIdleHtml();
        lucide.createIcons();
        if (!busy) cancelExportRequested = false;
      }

      function downloadButtonIdleHtml() {
        return batchExportSelected.checked
          ? `<i data-lucide="download"></i> <span>${t("downloadSelected")}</span>`
          : `<i data-lucide="download"></i> <span>${t("downloadCurrent")}</span>`;
      }

      function canExportNow() {
        if (batchExportSelected.checked) return getSelectedTracks().length > 0;
        return Boolean(getCurrentTrack());
      }

      function setExportProgress(percent) {
        const value = Math.max(0, Math.min(100, percent));
        exportProgress.style.width = `${value}%`;
        exportProgressBar.setAttribute("aria-valuenow", Math.round(value));
      }

      function setExportStatus(text) {
        exportStatus.textContent = text;
      }

      function selectedExportSettings() {
        if (exportFormat.value === "mp3-192") {
          return {
            extension: "mp3",
            ffmpegArgs: ["-c:a", "libmp3lame", "-b:a", "192k"],
            label: "MP3 192k",
            mimeType: "audio/mpeg",
            nameSuffix: "192k",
          };
        }

        if (exportFormat.value === "mp3-256") {
          return {
            extension: "mp3",
            ffmpegArgs: ["-c:a", "libmp3lame", "-b:a", "256k"],
            label: "MP3 256k",
            mimeType: "audio/mpeg",
            nameSuffix: "256k",
          };
        }

        return {
          extension: "wav",
          ffmpegArgs: ["-c:a", "pcm_s16le"],
          label: "WAV",
          mimeType: "audio/wav",
          nameSuffix: "wav",
        };
      }

      function buildOutputName(name, speed, extension, mode) {
        const baseName = name.replace(/\.[^/.]+$/, "");
        return `${baseName}_${formatSpeedRate(speed)}x_${mode}.${extension}`;
      }

      function formatSpeedRate(speed) {
        return Number(speed.toFixed(2)).toString();
      }

      function safeFileName(name) {
        return name.replace(/[^a-z0-9._-]/gi, "_");
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      class ExportCancelledError extends Error {
        constructor() {
          super("Export cancelled.");
          this.name = "ExportCancelledError";
        }
      }

      function throwIfExportCancelled() {
        if (cancelExportRequested) throw new ExportCancelledError();
      }

      function isExportCancelled(error) {
        return error instanceof ExportCancelledError || cancelExportRequested;
      }

      async function deleteFfmpegFileQuietly(ffmpeg, fileName) {
        try {
          await ffmpeg.deleteFile(fileName);
        } catch (_) {
          // The worker may have been terminated during cancellation.
        }
      }

      function encodeWavSamples(samples, sampleRate) {
        const channels = samples.length || 1;
        const sampleCount = samples[0]?.length || 0;
        const bytesPerSample = 2;
        const blockAlign = channels * bytesPerSample;
        const dataSize = sampleCount * blockAlign;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        writeString(view, 0, "RIFF");
        view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, "WAVE");
        writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, channels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bytesPerSample * 8, true);
        writeString(view, 36, "data");
        view.setUint32(40, dataSize, true);

        let offset = 44;
        for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex += 1) {
          for (let channel = 0; channel < channels; channel += 1) {
            const sample = Math.max(-1, Math.min(1, samples[channel]?.[sampleIndex] || 0));
            view.setInt16(
              offset,
              sample < 0 ? sample * 0x8000 : sample * 0x7fff,
              true,
            );
            offset += bytesPerSample;
          }
        }

        return new Blob([buffer], { type: "audio/wav" });
      }

      function encodeWav(audioBuffer) {
        const numChannels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const bytesPerSample = 2;
        const blockAlign = numChannels * bytesPerSample;
        const samples = audioBuffer.length;
        const dataSize = samples * blockAlign;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        writeString(view, 0, "RIFF");
        view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, "WAVE");
        writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bytesPerSample * 8, true);
        writeString(view, 36, "data");
        view.setUint32(40, dataSize, true);

        let offset = 44;
        const channels = Array.from({ length: numChannels }, (_, index) =>
          audioBuffer.getChannelData(index),
        );
        for (let i = 0; i < samples; i += 1) {
          for (let channel = 0; channel < numChannels; channel += 1) {
            const sample = Math.max(-1, Math.min(1, channels[channel][i]));
            view.setInt16(
              offset,
              sample < 0 ? sample * 0x8000 : sample * 0x7fff,
              true,
            );
            offset += bytesPerSample;
          }
        }

        return new Blob([buffer], { type: "audio/wav" });
      }

      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i += 1) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }

      function renderPlaylist() {
        playlistEmpty.style.display = tracks.length ? "none" : "block";
        cleanupSelectedTrackIds();
        trackList.innerHTML = tracks
          .map(
            (track) => `
              <div
                class="track-item ${track.id === currentTrackId ? "active" : ""}"
                data-track-id="${escapeHtml(track.id)}"
                role="button"
                tabindex="0"
              >
                <span class="track-row">
                  <span class="track-main">
                    <label class="track-select-control" aria-label="${escapeHtml(t("selectTrack", { name: track.name }))}">
                      <input
                        type="checkbox"
                        data-select-track-id="${escapeHtml(track.id)}"
                        ${selectedTrackIds.has(track.id) ? "checked" : ""}
                      />
                    </label>
                    <span class="track-info">
                      <span class="track-name">${escapeHtml(track.name)}</span>
                      <span class="track-meta">${track.size}</span>
                    </span>
                  </span>
                  <button
                    class="delete-btn"
                    data-delete-track-id="${escapeHtml(track.id)}"
                    aria-label="${escapeHtml(t("deleteTrack", { name: track.name }))}"
                    type="button"
                  >
                    <i data-lucide="trash-2"></i>
                  </button>
                </span>
              </div>
            `,
          )
          .join("");

        trackList.querySelectorAll(".track-item").forEach((button) => {
          button.addEventListener("click", () => {
            selectTrack(button.dataset.trackId, true);
          });
          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectTrack(button.dataset.trackId, true);
            }
          });
        });

        trackList
          .querySelectorAll("[data-select-track-id]")
          .forEach((checkbox) => {
            checkbox.addEventListener("click", (event) => {
              event.stopPropagation();
            });
            checkbox.addEventListener("change", () => {
              if (checkbox.checked) {
                selectedTrackIds.add(checkbox.dataset.selectTrackId);
              } else {
                selectedTrackIds.delete(checkbox.dataset.selectTrackId);
              }
              updateSelectionUi();
            });
          });

        trackList
          .querySelectorAll("[data-delete-track-id]")
          .forEach((button) => {
            button.addEventListener("click", (event) => {
              event.stopPropagation();
              deleteTrack(button.dataset.deleteTrackId);
            });
          });

        updateSelectionUi();
        lucide.createIcons();
      }

      function deleteTrack(trackId) {
        const trackIndex = tracks.findIndex((track) => track.id === trackId);
        if (trackIndex === -1) return;

        const [removedTrack] = tracks.splice(trackIndex, 1);
        URL.revokeObjectURL(removedTrack.url);
        selectedTrackIds.delete(trackId);

        if (currentTrackId === trackId) {
          if (sound) {
            sound.unload();
            sound = null;
          }
          isPlaying = false;
          currentTrackId = null;
          stopProgressLoop();
          setPlayButton(false);
          progress.style.width = "0%";
          currentTimeEl.textContent = "0:00";
          durationEl.textContent = "0:00";
          fileName.textContent = "";
          player.style.display = tracks.length ? "block" : "none";
          updateSelectionUi();

          const fallbackTrack = tracks[trackIndex] || tracks[trackIndex - 1];
          if (fallbackTrack) {
            selectTrack(fallbackTrack.id, false);
            return;
          }
        }

        renderPlaylist();
        updateSelectionUi();
      }

      function cleanupSelectedTrackIds() {
        const existingIds = new Set(tracks.map((track) => track.id));
        selectedTrackIds.forEach((trackId) => {
          if (!existingIds.has(trackId)) selectedTrackIds.delete(trackId);
        });
      }

      function getSelectedTracks() {
        cleanupSelectedTrackIds();
        return tracks.filter((track) => selectedTrackIds.has(track.id));
      }

      function updateSelectionUi() {
        cleanupSelectedTrackIds();

        const selectedCount = selectedTrackIds.size;
        const hasTracks = tracks.length > 0;
        selectAllControl.classList.toggle("visible", hasTracks);
        selectAllTracks.checked = hasTracks && selectedCount === tracks.length;
        selectAllTracks.indeterminate =
          selectedCount > 0 && selectedCount < tracks.length;
        selectAllTracks.disabled = isExporting || !hasTracks;
        selectAllLabel.textContent = selectedCount
          ? t("selectedCount", { selected: selectedCount, total: tracks.length })
          : t("selectAll");

        if (!isExporting) {
          downloadBtn.disabled = !canExportNow();
          downloadBtn.innerHTML = downloadButtonIdleHtml();
          lucide.createIcons();
        }
      }

      function setPlayButton(playing) {
        playBtn.setAttribute("aria-label", playing ? t("pause") : t("play"));
        playBtn.innerHTML = playing
          ? '<i data-lucide="pause"></i>'
          : '<i data-lucide="play"></i>';
        lucide.createIcons();
      }

      function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec.toString().padStart(2, "0")}`;
      }

      function formatFileSize(size) {
        if (size < 1024 * 1024) {
          return `${(size / 1024).toFixed(1)} KB`;
        }
        return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      }

      function escapeHtml(text) {
        return text.replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[char],
        );
      }

      setLanguage("zh");
      lucide.createIcons();

      const exportToggleBtn = document.getElementById('exportToggleBtn');
      const exportBody = document.getElementById('exportBody');

      exportToggleBtn.addEventListener('click', () => {
        const isExpanded = exportToggleBtn.getAttribute('aria-expanded') === 'true';
        const newState = !isExpanded;
        exportToggleBtn.setAttribute('aria-expanded', newState);
        exportBody.style.display = newState ? 'block' : 'none';
        // 更新图标（由 lucide 重新渲染）
        lucide.createIcons();
      });


    </script>
  </body>
